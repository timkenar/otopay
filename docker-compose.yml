version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: otopay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: otopay
      POSTGRES_USER: otopay
      POSTGRES_PASSWORD: otopay
    ports:
      - "5432:5432"
    volumes:
      - otopay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otopay -d otopay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  otopay_postgres_data:
